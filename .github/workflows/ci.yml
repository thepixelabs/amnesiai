name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    # Informational — pinned golangci-lint v1.64.8 is built with Go 1.24 and
    # cannot read go.mod targeting 1.25. Migration to golangci-lint v2 requires
    # .golangci.yaml schema rewrite; tracked separately. `go vet` still runs
    # as part of `go build ./...` on every test job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84  # v6.5.2
        with:
          version: v1.64.8

  test-ubuntu:
    name: "Test (ubuntu-latest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Run tests
        # 20m timeout: scrypt-factor-20 + race-detector pushes encrypted
        # round-trip tests past Go's default 10m on the macOS runner.
        run: go test -race -timeout 20m -coverprofile=coverage.out ./...

  test-macos:
    name: "Test (macos-latest)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Run tests
        # 20m timeout: scrypt-factor-20 + race-detector pushes encrypted
        # round-trip tests past Go's default 10m on the macOS runner.
        run: go test -race -timeout 20m -coverprofile=coverage.out ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Build
        run: go build ./...

  vuln-scan:
    name: "Vulnerability Scan"
    runs-on: ubuntu-latest
    # Informational — stdlib vulns require Go version upgrade, not code changes.
    # Track Go 1.25 upgrade separately; don't block PRs on stdlib CVEs.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...
