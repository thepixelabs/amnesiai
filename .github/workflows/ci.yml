name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.12.1

  test-ubuntu:
    name: "Test (ubuntu-latest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Run tests
        # 20m timeout: scrypt-factor-20 + race-detector pushes encrypted
        # round-trip tests past Go's default 10m on the macOS runner.
        run: go test -race -timeout 20m -coverprofile=coverage.out ./...

  test-macos:
    name: "Test (macos-latest)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Run tests
        # No -race on macOS: race-detector + scrypt-factor-20 is pathological
        # on the GitHub macOS runner (a single TestEncryptDecryptRoundTrip
        # exceeds 20min). Race detection is platform-agnostic for pure Go,
        # so the ubuntu job above provides full race coverage; this job
        # validates darwin build + test correctness only.
        run: go test -timeout 10m -coverprofile=coverage.out ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Build
        run: go build ./...

  vuln-scan:
    name: "Vulnerability Scan"
    runs-on: ubuntu-latest
    # Informational — stdlib vulns require Go version upgrade, not code changes.
    # Track Go 1.25 upgrade separately; don't block PRs on stdlib CVEs.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...
