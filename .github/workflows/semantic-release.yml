name: Semantic Release

on:
  push:
    branches: [main]

# Deny all permissions by default; the release job grants only what it needs.
permissions: {}

# Never cancel an in-flight release — a second push queues behind the running
# job rather than killing it mid-way through version bumping and tag creation.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push version-bump commit (CHANGELOG.md) and tag
      issues: write        # comment on issues referenced in commits
      pull-requests: write # comment on merged PRs with release link

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # GH_TOKEN (PAT with contents:write + workflows:write) lets semantic-release
          # push the CHANGELOG commit and vX.Y.Z tag past classic branch protection.
          # Classic branch protection (require_pr_reviews = false, enforce_admins = false)
          # allows admin-scoped PATs to push directly to main without a PR.
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release
