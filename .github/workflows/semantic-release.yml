name: Semantic Release

on:
  push:
    branches: [main]

permissions: {}

# Never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push CHANGELOG commit and tag
      issues: write        # comment on issues referenced in commits
      pull-requests: write # comment on merged PRs with release link

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # GH_TOKEN PAT (contents:write + workflows:write) bypasses branch
          # protection so semantic-release can push CHANGELOG and tags to main.
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        id: homebrew-tap-token
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: thepixelabs
          repositories: homebrew-tap

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf  # v6.3.0
        with:
          version: v2.8.2
          install-only: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          HOMEBREW_TAP_APP_TOKEN: ${{ steps.homebrew-tap-token.outputs.token }}
        run: npx semantic-release
