name: Semantic Release

on:
  push:
    branches: [main]

permissions: {}

# Never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push CHANGELOG commit and tag
      issues: write        # comment on issues referenced in commits
      pull-requests: write # comment on merged PRs with release link

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # GH_TOKEN PAT (contents:write + workflows:write) bypasses branch
          # protection so semantic-release can push CHANGELOG and tags to main.
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        id: homebrew-tap-token
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: thepixelabs
          repositories: homebrew-tap

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8  # v7.2.1
        with:
          version: v2.8.2
          install-only: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          HOMEBREW_TAP_APP_TOKEN: ${{ steps.homebrew-tap-token.outputs.token }}
        run: npx semantic-release
