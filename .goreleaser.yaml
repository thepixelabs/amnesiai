# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: amensiai

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/thepixelabs/amensiai/internal/version.Version={{.Version}}
      - -X github.com/thepixelabs/amensiai/internal/version.Commit={{.Commit}}
      - -X github.com/thepixelabs/amensiai/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{.ProjectName}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{incpatch .Version}}-next"

release:
  # semantic-release already created the release with notes; just add assets.
  mode: keep-existing

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]

brews:
  - name: amensiai
    repository:
      owner: thepixelabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_APP_TOKEN }}"
      git:
        url: "https://x-access-token:{{ .Env.HOMEBREW_TAP_APP_TOKEN }}@github.com/thepixelabs/homebrew-tap.git"
    homepage: "https://amensiai.pixelabs.net"
    description: "git your ai setup — backup and restore AI coding assistant configurations"
    license: "MIT"
    install: |
      bin.install "amensiai"
    test: |
      system "#{bin}/amensiai", "version"
